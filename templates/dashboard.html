<!DOCTYPE html>
<html>

<head>

<title>LifeOS Dashboard</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>LifeOS</h2>

<a href="/dashboard">Dashboard</a>
<a href="/tasks">Tasks</a>
<a href="/calendar">Calendar</a>
<a href="/notes">Notes</a>
<a href="/ai">AI Assistant</a>
<a href="/logout">Logout</a>

</div>


<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Tasks</h3>
<p>{{ tasks|length }}</p>
</div>

<div class="card">
<h3>Productivity</h3>
<p>{{ productivity }}%</p>
</div>

</div>


<div class="card" style="margin-top:40px">

<h3>Productivity Chart</h3>

<canvas id="chart"></canvas>

</div>

</div>

</div>


<script>

const productivity = {{ productivity | tojson }};

const ctx = document.getElementById("chart");

new Chart(ctx, {

type: "doughnut",

data: {

labels: ["Completed", "Remaining"],

datasets: [{

data: [productivity, 100 - productivity],

borderWidth: 1

}]

},

options: {

responsive: true,

plugins: {

legend: {

labels: {

color: "white"

}

}

}

}

});

</script>


</body>

</html>
