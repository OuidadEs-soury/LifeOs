<!DOCTYPE html>
<html>

<head>

<title>LifeOS Dashboard</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>LifeOS</h2>

<a href="/dashboard">Dashboard</a>
<a href="/tasks">Tasks</a>
<a href="/ai">AI Assistant</a>
<a href="/logout">Logout</a>

</div>


<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Total Tasks</h3>

<p>{{ tasks|length }}</p>

</div>


<div class="card">

<h3>Productivity</h3>

<p id="productivity-value">{{ productivity }}%</p>

</div>

</div>


<div class="card chart-card" data-productivity="{{ productivity }}">

<h3>Productivity Chart</h3>

<canvas id="chart"></canvas>

</div>


</div>

</div>


<script src="/static/js/analytics.js"></script>

</body>

</html>
